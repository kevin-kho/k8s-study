# Create a new deployment named resource-deployment using the busybox image. The deployment should initially have 2 replicas.
# Set resource requests and limits for the containers in the deployment:
#
# Requests:
# CPU: 100m
# Memory: 128Mi
#
# Limits:
# CPU: 500m
# Memory: 256Mi
#
# Scale the deployment to 4 replicas.
# Verify that the resource requests and limits are correctly applied to the containers.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: resource-deployment
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: resource-deployment
  template:
    metadata:
      labels:
        app: resource-deployment
    spec:
      containers:
        - name: busybox
          image: busybox:latest
          command: ["sleep", "infinity"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
