apiVersion: v1
kind: PersistentVolume
metadata:
  name: postgres-pv-0
spec:
  accessModes:
    - ReadWriteOnce
  capacity:
    storage: 1Gi
  storageClassName: postgres-storage
  hostPath:
    path: /mnt/pgsql0
---
