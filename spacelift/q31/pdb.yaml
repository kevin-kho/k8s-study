apiVersion: apps/v1
kind: Deployment
metadata:
  name: busybox-deploy-pdb
  namespace: default
spec:
  replicas: 3
  selector:
    matchLabels:
      app: busybox-deploy-pdb
  template:
    metadata:
      labels:
        app: busybox-deploy-pdb
    spec:
      containers:
        - name: busybox
          image: busybox:1.38.0
          command: ["sleep", "infinity"]
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
   name: busybox-pdb
   namespace: default
spec:
   maxUnavailable: 1
   selector:
     matchLabels:
       app: busybox-deploy-pdb
