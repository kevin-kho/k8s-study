# Create a new deployment named web-deployment using the nginx:latest image. The deployment should initially have 2 replicas.
# Scale the deployment to 8 replicas.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-deployment
  namespace: default
spec:
  selector:
    matchLabels:
      app: web-deployment
  replicas: 2
  template:
    metadata:
      labels:
        app: web-deployment
    spec:
      containers:
        - name: nginx
          image: nginx:latest
